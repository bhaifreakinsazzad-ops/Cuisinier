<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff7a00" />
  <title>Offline — Cuisinier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ff7a00;
    }
    p {
      font-size: 16px;
      color: #999;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn {
      background: #ff7a00;
      color: #080808;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
    }
    .pulse {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <img src="/icons/icon-192.png" alt="Cuisinier" class="icon" />
  <h1>You're Offline</h1>
  <p>Cuisinier app shell is ready.<br>Internet connection is needed to place orders.</p>
  <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  <div class="status pulse" id="status">Checking connection...</div>

  <script>
    function checkOnline() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = 'Back online! Redirecting...';
        statusEl.style.color = '#4ade80';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        statusEl.textContent = 'Waiting for internet connection...';
      }
    }
    window.addEventListener('online', checkOnline);
    checkOnline();
  </script>
</body>
</html>
